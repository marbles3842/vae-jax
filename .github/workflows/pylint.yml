name: Pylint

on:
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Run Pylint
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # If any extra dependencies are needed for imports to resolve correctly:
        pip install "grain[python]" datasets matplotlib

    - name: Run Pylint
      run: |
        pylint --fail-under=8.0 vae.py train.py mnist_data_loader.py
