name: CI

on:
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt pytest
        # If any extra dependencies are needed for imports to resolve correctly:
        pip install "grain[python]" datasets matplotlib

    - name: Run Pylint
      run: |
        pylint --rcfile=.pylintrc --fail-under=8 $(git ls-files '*.py')

    - name: Run Tests
      run: |
        python -m pytest
